<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">    
<title>Marlon Marius</title>
<link rel="icon" type="image/png" href="/favicon.png">

<style>
body {
    margin: 0;
    font-family: Helvetica, Arial, sans-serif;
    background: #f4f4f4;
    color: #222;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 30px 60px;
}

.logo {
    font-size: 20px;
    letter-spacing: 3px;
}
.instagram-link {
  position: fixed;
  bottom: 30px;
  right: 40px;
}

.instagram-icon {
  width: 24px;
  transition: opacity 0.3s ease;
}

.instagram-icon:hover {
  opacity: 0.4;
}
    
.nav a {
  text-decoration: none;
  color: #222;
  margin-left: 30px;
  transition: color 0.3s ease;
}

.nav a:hover {
  color: #999;
}

/* IMAGE */
.container {
    padding: 40px 60px;
}

.main-image {
  width: 700px;
  max-width: 100%;
  opacity: 0;
  animation: fadeIn 1.5s ease forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
  }
}
    @media (max-width: 768px) {
  body {
    padding-left: 18px;
    padding-right: 18px;
  }

  .container,
  .home,
  .page,
  .scene {
    min-height: 100vh;
    height: auto;
    padding-top: 90px;
    padding-bottom: 40px;
  }

  h1 {
    font-size: 28px;
    line-height: 1.1;
    letter-spacing: 1px;
    text-align: center;
    margin-bottom: 24px;
  }

  h2 {
    font-size: 20px;
    line-height: 1.2;
  }

  p {
    font-size: 15px;
    line-height: 1.5;
  }

  nav,
  .menu,
  .links {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  nav a,
  .menu a,
  .links a {
    font-size: 20px;
    line-height: 1.3;
    letter-spacing: 1px;
    text-align: center;
  }

  img,
  .hero-image,
  .main-image {
    max-width: 100%;
    height: auto;
    display: block;
  }

  .close {
    top: 18px;
    right: 18px;
    font-size: 20px;
  }
}
</style>

</head>

<body>

<div class="header">
    <div class="logo">MARLON MARIUS</div>

    <div class="nav">
        <a href="#">À PROPOS</a>
        <a href="/projets/">PROJETS</a>
        <a href="#">EXPOSITIONS / EVENEMENTS</a>
        <a href="#">CONTACT</a>
    </div>
</div>

<div class="container">
    <img src="https://pub-c0638a386edd4fe9a86f732550fd758a.r2.dev/accueil%20web.png" class="main-image">
</div>
<div class="instagram-link">
  <a href="https://www.instagram.com/marlon_marius" target="_blank">
    <img src="/instagram.png" alt="Instagram" class="instagram-icon">
  </a>
</div>
</body>
</html>
