    margin: 0;
    font-family: Helvetica, Arial, sans-serif;
    background: #f4f4f4;
    color: #222;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 30px 60px;
}

.logo {
    font-size: 20px;
    letter-spacing: 3px;

.nav a {
  text-decoration: none;
  color: #222;
  margin-left: 30px;
  transition: color 0.3s ease;
}

.nav a:hover {

}

/* IMAGE */

    padding: 40px 60px;
}

.main-image {
  width: 700px;
  max-width: 100%;
  opacity: 0;
  animation: fadeIn 1.5s ease forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
  }
}
</style>

</head>

    <div class="nav">
