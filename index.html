<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">    
<title>Marlon Marius</title>
<link rel="icon" type="image/png" href="/favicon.png">

<style>
body {
    margin: 0;
    font-family: Helvetica, Arial, sans-serif;
    background: #f4f4f4;
    color: #222;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 30px 60px;
}

.logo {
    font-size: 20px;
    letter-spacing: 3px;
}
.instagram-link {
  position: fixed;
  bottom: 30px;
  right: 40px;
}

.instagram-icon {
  width: 24px;
  transition: opacity 0.3s ease;
}

.instagram-icon:hover {
  opacity: 0.4;
}
    
.nav a {
  text-decoration: none;
  color: #222;
  margin-left: 30px;
  transition: color 0.3s ease;
}

.nav a:hover {
  color: #999;
}

/* IMAGE */
.container {
    padding: 40px 60px;
}

.main-image {
  width: 700px;
  max-width: 100%;
  opacity: 0;
  animation: fadeIn 1.5s ease forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
  }
}
  @media (max-width: 768px) {
  body {
    padding-left: 0;
    padding-right: 0;
  }

  .header {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 22px 20px 0;
    gap: 20px;
  }

  .logo {
    font-size: 18px;
    letter-spacing: 3px;
    line-height: 1.2;
  }

  .nav {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
    width: 100%;
  }

  .nav a {
    margin-left: 0;
    font-size: 18px;
    line-height: 1.25;
    letter-spacing: 0.5px;
  }

  .container {
    padding: 26px 20px 100px;
  }

  .main-image {
    width: 100%;
    max-width: 100%;
    display: block;
  }

  .instagram-link {
    bottom: 20px;
    right: 20px;
  }

  .instagram-icon {
    width: 22px;

  }
}
</style>

</head>

<body>

<div class="header">
    <div class="logo">MARLON MARIUS</div>

    <div class="nav">
        <a href="#">À PROPOS</a>
        <a href="/projets/">PROJETS</a>
        <a href="#">EXPOSITIONS / EVENEMENTS</a>
        <a href="#">CONTACT</a>
    </div>
</div>

<div class="container">
    <img src="https://pub-c0638a386edd4fe9a86f732550fd758a.r2.dev/accueil%20web.png" class="main-image">
</div>
<div class="instagram-link">
  <a href="https://www.instagram.com/marlon_marius" target="_blank">
    <img src="/instagram.png" alt="Instagram" class="instagram-icon">
  </a>
</div>
</body>
</html>
