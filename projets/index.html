<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Projets</title>

<style>
body {
  margin: 0;
  background: #f4f4f4;
  font-family: Helvetica, Arial, sans-serif;
  color: #222;
}

.projects {
  margin-top: 50px;
  text-align: center;
}

/* bouton fermer */
.close {
    position: absolute;
    top: 30px;
    right: 40px;
    font-size: 28px;
    text-decoration: none;
    color: black;
}

/* centre la page */
.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* titre */
h1 {
    margin-bottom: 40px;
    letter-spacing: 3px;
    font-weight: normal;
}

/* liste projets */
.projects {
    display: flex;
    flex-direction: column;
    gap: 30px; /* espace égal */
    text-align: center;
}

.projects div {
    font-size: 18px;
    letter-spacing: 2px;
}
</style>

</head>

<body>

<a href="/" class="close">✕</a>

<div class="container">
    <h1>PROJETS</h1>

    <div class="projects">
        <div>FM MER</div>
        <div>LE LITTORAL OU RIEN</div>
        <div>RÉCIT ARGILEUX</div>
        <div>INTÉRIEUR/EXTÉRIEUR</div>
    </div>
</div>

</body>
</html>
