<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projets</title>

<style>
body {
  margin: 0;
  background: #f4f4f4;
  font-family: Helvetica, Arial, sans-serif;
  color: #222;
}
  @keyframes pageFade {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* bouton fermer */
.close {
  position: absolute;
  top: 30px;
  right: 40px;
  font-size: 28px;
  text-decoration: none;
  color: black;
}

/* centre la page */

.container {
  height: 50vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  animation: pageFade 0.8s ease;
}

/* titre */
h1 {
  margin-bottom: 40px;
  letter-spacing: 3px;
  font-weight: normal;
}

/* liste projets */
.projects {
  display: flex;
  flex-direction: column;
  gap: 30px;
  text-align: center;
}

/* style commun pour les projets */
.project-link,
.project-item {
  font-size: 18px;
  letter-spacing: 2px;
  color: #222;
  text-decoration: none;
  transition: opacity 0.3s ease;
}

/* effet au survol */
.project-link:hover,
.project-item:hover {
  opacity: 0.6;
}
  @media (max-width: 768px) {
  .container {
    min-height: 100vh;
    height: auto;
    padding: 110px 24px 40px;
    justify-content: flex-start;
  }

  h1 {
    font-size: 24px;
    margin-bottom: 32px;
    letter-spacing: 2px;
  }

  .projects {
    gap: 26px;
  }

  .project-link,
  .project-item,
  .projects div,
  .projects a {
    font-size: 20px;
    letter-spacing: 1.5px;
    line-height: 1.35;
  }

  .close {
    top: 20px;
    right: 20px;
    font-size: 22px;
  }
 }
</style>

</head>

<body>

<a href="/" class="close">✕</a>

<div class="container">
  <h1>PROJETS</h1>

  <div class="projects">
    <a href="/projets/ondes/" class="project-link">ONDES</a>
    <div class="project-item">LÀ OU L'AIR EST DIFFÉRENT</div>
    <div class="project-item">RÉCIT ARGILEUX</div>
  </div>
</div>

</body>
</html>
